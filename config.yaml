# Configuration settings for the malware detection system

model:
  path: "data/best_model.pkl"
  scaler_path: "data/scaler.pkl"

monitor:
  download_directory: "/path/to/downloads"
  file_extension: ".apk"

logging:
  level: "INFO"
  log_file: "logs/malware_detection.log"

api:
  host: "0.0.0.0"
  port: 5000

features:
  use_smote: true
  smote_ratio: 0.5

hyperparameters:
  learning_rate: 0.1
  num_leaves: 31
  max_depth: -1
  min_child_samples: 20

evaluation:
  metrics:
    - accuracy
    - precision
    - recall
    - f1_score
    - roc_auc